<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dwtd4gamer's free games site</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background:#f0f4f8;
            display:flex;
            flex-direction:column;
            align-items:center;
            margin:0;
            padding:2rem;
        }
        h1 {
            color:#333;
        }
        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
            gap:1.5rem;
            width:100%;
            max-width:800px;
        }
        .box {
            background:#fff;
            border:2px solid #4a90e2;
            border-radius:8px;
            text-align:center;
            line-height:150px;
            font-size:1.2rem;
            color:#4a90e2;
            cursor:pointer;
            text-decoration:none;
            transition:background .2s, color .2s, transform .1s;
        }
        .box:hover {
            background:#4a90e2;
            color:#fff;
            transform:translateY(-2px);
        }
    </style>
</head>
<body>

<h1>dwtd4gamer's free games site</h1>

<div class="grid">
    <a href="2048.html" class="box">2048</a>
    <a href="tetris.html" class="box">Coming soon!</a>

    <a href="maze.html" class="box">Coming soon!</a>

</div>

</body>
</html>
